services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  clip-api:
    build:
      context: ./services/clip-factory
    command: python -m uvicorn clip_factory.api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CLIP_FACTORY_DATA_DIR: /app/data
      CLIP_FACTORY_OUTPUT_DIR: /app/outputs
      CLIP_FACTORY_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      - redis
    ports:
      - "8000:8000"

  clip-worker:
    build:
      context: ./services/clip-factory
    command: python -m clip_factory.worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CLIP_FACTORY_DATA_DIR: /app/data
      CLIP_FACTORY_OUTPUT_DIR: /app/outputs
      CLIP_FACTORY_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    depends_on:
      - redis

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.13.3}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_NATIVE_PYTHON_RUNNER: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      N8N_RESTRICT_FILE_ACCESS_TO: ${N8N_RESTRICT_FILE_ACCESS_TO:-/home/node/.n8n-files}
      NODES_EXCLUDE: ${NODES_EXCLUDE:-["n8n-nodes-base.executeCommand","n8n-nodes-base.localFileTrigger"]}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/files/workflows
    depends_on:
      - clip-api

  task-runners:
    image: n8nio/runners:${N8N_VERSION:-2.13.3}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
    depends_on:
      - n8n

volumes:
  n8n_data:
